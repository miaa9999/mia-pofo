name: Release Deploy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall app

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run css:build

      - name: Validate Docker Compose files
        run: |
          docker compose config
          APP_IMAGE=ghcr.io/example/for-hyun:test \
          POSTGRES_USER=postgres \
          POSTGRES_PASSWORD=postgres \
          POSTGRES_DB=appdb \
          docker compose -f docker-compose.prod.yml config

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: verify

    outputs:
      image: ${{ steps.image.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          image_name="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${REGISTRY}/${image_name}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "latest=${REGISTRY}/${image_name}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.latest }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    env:
      APP_IMAGE: ${{ needs.build.outputs.image }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      APP_PORT: ${{ secrets.APP_PORT || '8000' }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$POSTGRES_USER"
          test -n "$POSTGRES_PASSWORD"
          test -n "$POSTGRES_DB"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deploy bundle
        run: |
          mkdir -p release/ddl
          cp docker-compose.prod.yml release/docker-compose.yml
          cp -r ddl/. release/ddl/
          cat > release/.env <<EOF
          APP_IMAGE=$APP_IMAGE
          APP_PORT=$APP_PORT
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=$POSTGRES_DB
          EOF

      - name: Upload compose files
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" -r release/. "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd '$DEPLOY_PATH' &&
            if [ -n '$GHCR_USERNAME' ] && [ -n '$GHCR_TOKEN' ]; then
              echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin
            fi &&
            docker compose pull &&
            docker compose up -d &&
            docker image prune -f
          "
