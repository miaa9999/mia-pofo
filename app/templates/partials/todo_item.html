<article class="flex items-center justify-between gap-4 py-3">
  <p class="text-sm font-medium text-slate-800">{{ todo.title }}</p>
  <time class="shrink-0 text-xs text-slate-500" datetime="{{ todo.created_at.isoformat() }}">
    {{ todo.created_at.strftime("%Y-%m-%d %H:%M") }}
  </time>
</article>
